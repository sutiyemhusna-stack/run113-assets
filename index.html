<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUN113 - SITUS GACOR</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; text-align: center; padding: 20px; }
        
        /* Animasi Gambar Mengambang */
        .banner { width: 100%; border: 3px solid #d4af37; border-radius: 15px; box-shadow: 0 0 20px #d4af37; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Tombol Animasi Berdenyut */
        .btn { display: block; width: 100%; margin: 15px 0; padding: 15px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 1.2rem; transition: 0.3s; }
        .btn-login { background: linear-gradient(#ffe000, #b8860b); color: #000; animation: pulse 2s infinite; }
        .btn-daftar { background: linear-gradient(#00aaff, #0044cc); color: #fff; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="container">
        <img src="ChatGPT Image 5 Apr 2026, 17.39.38.png" class="banner" alt="Banner Gacor">
        <a href="https://www.run113.it.com/register?ref=F88M1AL000YH" class="btn btn-login">LOGIN</a>
        <a href="https://www.run113.it.com/register?ref=F88M1AL000YH" class="btn btn-daftar">DAFTAR</a>
    </div>
</body>
</html>
